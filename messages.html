<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chaterra — Messages</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth}
        body{font-family:'Poppins','Inter',sans-serif;background:#0B0F1A;color:#FFF;min-height:100vh;overflow-x:hidden}
        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:rgba(77,163,255,0.3);border-radius:3px}

        .bg-glow{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;overflow:hidden}
        .bg-orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.08;animation:orbDrift ease-in-out infinite}
        .bg-orb:nth-child(1){width:380px;height:380px;background:#4DA3FF;top:-120px;left:-80px;animation-duration:16s}
        .bg-orb:nth-child(2){width:320px;height:320px;background:#A855F7;bottom:-100px;right:-60px;animation-duration:20s;animation-delay:4s}
        .bg-orb:nth-child(3){width:220px;height:220px;background:#FF4D8D;top:45%;left:55%;animation-duration:13s;animation-delay:7s}
        @keyframes orbDrift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-40px,50px) scale(1.1)}66%{transform:translate(30px,-30px) scale(0.95)}}

        .app-shell{position:relative;z-index:1;display:flex;height:100vh;max-width:1100px;margin:0 auto}

        /* ===== CONVERSATIONS LIST PANEL ===== */
        .conv-panel{width:100%;max-width:420px;display:flex;flex-direction:column;border-right:1px solid rgba(77,163,255,0.08);background:rgba(11,15,26,0.5);height:100vh;flex-shrink:0}
        .conv-panel.hidden-mobile{display:none}

        .conv-header{position:sticky;top:0;z-index:50;background:rgba(11,15,26,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(77,163,255,0.08);padding:14px 16px;flex-shrink:0}
        .conv-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
        .conv-title{font-size:20px;font-weight:800;background:linear-gradient(135deg,#4DA3FF,#A855F7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .conv-header-actions{display:flex;gap:8px}

        .icon-btn{width:38px;height:38px;border-radius:11px;border:none;background:rgba(26,36,56,0.7);color:#A1A1AA;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s ease;-webkit-tap-highlight-color:transparent}
        .icon-btn:hover{background:rgba(77,163,255,0.15);color:#4DA3FF}
        .icon-btn:active{transform:scale(0.88)}

        .conv-search-wrap{position:relative}
        .conv-search-input{width:100%;padding:10px 14px 10px 38px;background:rgba(26,36,56,0.6);border:1.5px solid rgba(77,163,255,0.08);border-radius:12px;color:#FFF;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:all 0.3s ease}
        .conv-search-input::placeholder{color:#6B7280}
        .conv-search-input:focus{border-color:rgba(77,163,255,0.3);background:rgba(26,36,56,0.9)}
        .conv-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#6B7280;font-size:13px;pointer-events:none}

        .conv-list{flex:1;overflow-y:auto;padding:8px 0}

        .conv-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:all 0.3s ease;position:relative;-webkit-tap-highlight-color:transparent;animation:convSlide 0.4s ease backwards}
        @keyframes convSlide{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
        .conv-item:hover{background:rgba(77,163,255,0.05)}
        .conv-item.active{background:rgba(77,163,255,0.08)}
        .conv-item:active{background:rgba(77,163,255,0.12)}
        .conv-item.unread-conv .conv-last-msg{color:#FFF;font-weight:600}

        .conv-avatar-wrap{position:relative;flex-shrink:0}
        .conv-avatar{width:52px;height:52px;border-radius:16px;overflow:hidden;background:linear-gradient(135deg,#4DA3FF,#A855F7)}
        .conv-avatar img{width:100%;height:100%;object-fit:cover}
        .ca-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700}
        .online-dot{position:absolute;bottom:2px;right:2px;width:12px;height:12px;background:#34D399;border-radius:50%;border:2px solid #0B0F1A;animation:onlinePulse 3s ease-in-out infinite}
        @keyframes onlinePulse{0%,100%{opacity:1}50%{opacity:0.5}}

        .conv-info{flex:1;min-width:0}
        .conv-name-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
        .conv-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:5px}
        .conv-name .verified{color:#4DA3FF;font-size:11px}
        .conv-time{font-size:10px;color:#6B7280;white-space:nowrap}
        .conv-last-row{display:flex;align-items:center;justify-content:space-between;gap:6px}
        .conv-last-msg{font-size:12px;color:#6B7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
        .conv-last-msg.you::before{content:'You: ';color:#4DA3FF}
        .conv-unread-badge{min-width:20px;height:20px;background:#4DA3FF;border-radius:10px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 4px;flex-shrink:0;animation:badgePop 0.3s ease}
        @keyframes badgePop{from{transform:scale(0)}to{transform:scale(1)}}

        .conv-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60%;padding:24px;text-align:center}
        .conv-empty-icon{width:72px;height:72px;border-radius:22px;background:rgba(77,163,255,0.06);display:flex;align-items:center;justify-content:center;font-size:30px;color:rgba(77,163,255,0.3);margin-bottom:16px;animation:emptyFloat 3s ease-in-out infinite}
        @keyframes emptyFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        .conv-empty-title{font-size:16px;font-weight:700;margin-bottom:8px}
        .conv-empty-text{font-size:13px;color:#6B7280;line-height:1.6}

        /* ===== CHAT PANEL ===== */
        .chat-panel{flex:1;display:none;flex-direction:column;height:100vh;min-width:0}
        .chat-panel.show{display:flex}

        .no-chat-selected{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
        .no-chat-icon{width:88px;height:88px;border-radius:26px;background:rgba(77,163,255,0.06);display:flex;align-items:center;justify-content:center;font-size:40px;color:rgba(77,163,255,0.2);margin-bottom:20px;animation:noChatFloat 4s ease-in-out infinite}
        @keyframes noChatFloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-10px) rotate(3deg)}}
        .no-chat-title{font-size:20px;font-weight:700;margin-bottom:8px}
        .no-chat-text{font-size:13px;color:#6B7280;max-width:260px;line-height:1.6}

        .chat-header{display:none;align-items:center;gap:12px;padding:12px 16px;background:rgba(11,15,26,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(77,163,255,0.08);flex-shrink:0}
        .chat-header.show{display:flex}

        .chat-back-btn{width:36px;height:36px;border-radius:10px;border:none;background:rgba(26,36,56,0.7);color:#A1A1AA;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s ease;-webkit-tap-highlight-color:transparent}
        .chat-back-btn:hover{color:#4DA3FF}
        .chat-back-btn:active{transform:scale(0.88)}

        .chat-header-avatar{width:40px;height:40px;border-radius:12px;overflow:hidden;cursor:pointer;flex-shrink:0}
        .chat-header-avatar img{width:100%;height:100%;object-fit:cover}
        .cha-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;background:linear-gradient(135deg,#4DA3FF,#A855F7)}

        .chat-header-info{flex:1;min-width:0;cursor:pointer}
        .chat-header-name{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px}
        .chat-header-name .verified{color:#4DA3FF;font-size:11px}
        .chat-header-status{font-size:11px;color:#6B7280;display:flex;align-items:center;gap:4px;margin-top:1px}
        .chat-header-status.online{color:#34D399}
        .chat-header-actions{display:flex;gap:6px}

        .messages-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:4px;scroll-behavior:smooth}
        .messages-area::-webkit-scrollbar{width:3px}
        .messages-area::-webkit-scrollbar-thumb{background:rgba(77,163,255,0.2);border-radius:3px}

        .msg-date-divider{display:flex;align-items:center;gap:10px;margin:12px 0}
        .msg-date-divider span{font-size:11px;color:#6B7280;white-space:nowrap;padding:4px 10px;background:rgba(26,36,56,0.6);border-radius:8px}
        .msg-date-line{flex:1;height:1px;background:rgba(77,163,255,0.06)}

        .msg-row{display:flex;align-items:flex-end;gap:6px;animation:msgAppear 0.3s ease;margin-bottom:2px}
        @keyframes msgAppear{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .msg-row.sent{flex-direction:row-reverse}

        .msg-row-avatar{width:26px;height:26px;border-radius:8px;overflow:hidden;flex-shrink:0}
        .msg-row-avatar img{width:100%;height:100%;object-fit:cover}
        .mra-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:linear-gradient(135deg,#4DA3FF,#A855F7)}

        .msg-bubble-wrap{max-width:70%;display:flex;flex-direction:column;gap:2px}
        .msg-row.sent .msg-bubble-wrap{align-items:flex-end}

        .msg-bubble{padding:10px 14px;border-radius:18px;font-size:13px;line-height:1.5;word-break:break-word;transition:all 0.2s ease}
        .msg-bubble:hover{filter:brightness(1.08)}
        .msg-row.received .msg-bubble{background:rgba(26,36,56,0.9);border-bottom-left-radius:4px;color:#E5E7EB}
        .msg-row.sent .msg-bubble{background:linear-gradient(135deg,#4DA3FF,#A855F7);border-bottom-right-radius:4px;color:#FFF}
        .msg-row.received.consecutive .msg-bubble{border-top-left-radius:4px}
        .msg-row.sent.consecutive .msg-bubble{border-top-right-radius:4px}

        .msg-time-label{font-size:10px;color:#6B7280;padding:0 4px;display:flex;align-items:center;gap:4px}
        .msg-row.sent .msg-time-label{flex-direction:row-reverse}
        .msg-status-icon{font-size:10px}
        .msg-status-icon.read{color:#4DA3FF}
        .msg-status-icon.delivered{color:#A1A1AA}

        .typing-indicator{display:none;align-items:center;gap:8px;padding:4px 0}
        .typing-indicator.show{display:flex;animation:msgAppear 0.3s ease}
        .typing-dots{display:flex;align-items:center;gap:4px;padding:10px 14px;background:rgba(26,36,56,0.9);border-radius:18px 18px 18px 4px}
        .typing-dot{width:6px;height:6px;border-radius:50%;background:#6B7280;animation:typingBounce 1.4s ease-in-out infinite}
        .typing-dot:nth-child(2){animation-delay:0.2s}
        .typing-dot:nth-child(3){animation-delay:0.4s}
        @keyframes typingBounce{0%,60%,100%{transform:translateY(0);background:#6B7280}30%{transform:translateY(-6px);background:#4DA3FF}}

        .msg-input-bar{padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:rgba(11,15,26,0.92);backdrop-filter:blur(20px);border-top:1px solid rgba(77,163,255,0.08);display:none;align-items:flex-end;gap:8px;flex-shrink:0}
        .msg-input-bar.show{display:flex}

        .msg-action-btn{width:38px;height:38px;border-radius:11px;border:none;background:rgba(26,36,56,0.7);color:#6B7280;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s ease;-webkit-tap-highlight-color:transparent;flex-shrink:0}
        .msg-action-btn:hover{background:rgba(77,163,255,0.12);color:#4DA3FF}
        .msg-action-btn:active{transform:scale(0.88)}

        .msg-input-wrap{flex:1;position:relative}
        .msg-textarea{width:100%;min-height:38px;max-height:120px;padding:9px 40px 9px 14px;background:rgba(26,36,56,0.8);border:1.5px solid rgba(77,163,255,0.1);border-radius:14px;color:#FFF;font-family:'Inter',sans-serif;font-size:14px;outline:none;resize:none;transition:all 0.3s ease;overflow-y:auto;line-height:1.4}
        .msg-textarea::placeholder{color:#6B7280}
        .msg-textarea:focus{border-color:rgba(77,163,255,0.35);background:rgba(26,36,56,1)}

        .emoji-toggle-btn{position:absolute;right:10px;bottom:7px;background:none;border:none;color:#6B7280;font-size:18px;cursor:pointer;transition:all 0.3s ease;-webkit-tap-highlight-color:transparent}
        .emoji-toggle-btn:hover{color:#FBBF24;transform:scale(1.1)}

        .send-btn{width:40px;height:40px;border-radius:12px;border:none;background:linear-gradient(135deg,#4DA3FF,#A855F7);color:#FFF;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s ease;flex-shrink:0;-webkit-tap-highlight-color:transparent}
        .send-btn:hover{transform:scale(1.08);box-shadow:0 4px 16px rgba(77,163,255,0.35)}
        .send-btn:active{transform:scale(0.9)}

        .emoji-picker-wrap{position:absolute;bottom:100%;right:0;width:260px;max-height:200px;background:rgba(18,26,42,0.97);border:1px solid rgba(77,163,255,0.15);border-radius:16px;padding:10px;display:none;flex-wrap:wrap;gap:5px;overflow-y:auto;z-index:50;animation:emojiIn 0.3s ease;margin-bottom:8px}
        .emoji-picker-wrap.open{display:flex}
        @keyframes emojiIn{from{opacity:0;transform:translateY(10px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}
        .ep-emoji{font-size:20px;cursor:pointer;padding:3px;border-radius:6px;transition:all 0.2s ease;line-height:1}
        .ep-emoji:hover{background:rgba(77,163,255,0.1);transform:scale(1.2)}

        /* ===== NEW MSG OVERLAY ===== */
        .new-msg-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;display:none;align-items:flex-end}
        .new-msg-overlay.open{display:flex}
        .new-msg-panel{width:100%;max-width:600px;margin:0 auto;background:rgba(18,26,42,0.98);backdrop-filter:blur(24px);border-radius:28px 28px 0 0;border:1px solid rgba(77,163,255,0.1);padding:20px 16px;padding-bottom:max(24px,env(safe-area-inset-bottom));animation:panelUp 0.4s cubic-bezier(0.25,0.46,0.45,0.94);max-height:70vh;overflow-y:auto}
        @keyframes panelUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        .panel-handle{width:40px;height:4px;background:rgba(255,255,255,0.12);border-radius:4px;margin:0 auto 20px}
        .panel-title{font-size:18px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
        .panel-title i{color:#4DA3FF}
        .new-msg-search-wrap{position:relative;margin-bottom:16px}
        .new-msg-search{width:100%;padding:12px 14px 12px 38px;background:rgba(11,15,26,0.8);border:1.5px solid rgba(77,163,255,0.12);border-radius:14px;color:#FFF;font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:all 0.3s ease}
        .new-msg-search::placeholder{color:#6B7280}
        .new-msg-search:focus{border-color:#4DA3FF}
        .new-msg-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#6B7280;font-size:13px;pointer-events:none}

        .panel-user-card{display:flex;align-items:center;gap:12px;padding:12px;background:rgba(26,36,56,0.4);border-radius:14px;margin-bottom:8px;cursor:pointer;transition:all 0.3s ease;animation:convSlide 0.3s ease backwards}
        .panel-user-card:hover{background:rgba(77,163,255,0.08);transform:translateX(4px)}
        .panel-user-card:active{transform:scale(0.97)}
        .puc-avatar{width:44px;height:44px;border-radius:13px;overflow:hidden;flex-shrink:0}
        .puc-avatar img{width:100%;height:100%;object-fit:cover}
        .puc-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700}
        .puc-info{flex:1}
        .puc-name{font-size:14px;font-weight:600}
        .puc-username{font-size:12px;color:#A1A1AA;margin-top:2px}
        .puc-role-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px}
        .puc-role-tag.streamer{background:rgba(255,77,141,0.12);color:#FF4D8D}
        .puc-role-tag.listener{background:rgba(77,163,255,0.1);color:#4DA3FF}

        /* ===== BOTTOM NAV (mobile only when conv list visible) ===== */
        .bottom-nav{position:fixed;bottom:0;left:0;width:100%;z-index:100;background:rgba(11,15,26,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(77,163,255,0.08);padding:8px 0;padding-bottom:max(8px,env(safe-area-inset-bottom))}
        .bottom-nav.hidden{display:none}
        .nav-inner{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-around}
        .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 12px;border:none;background:none;color:#6B7280;cursor:pointer;transition:all 0.3s ease;font-family:'Poppins',sans-serif;position:relative;-webkit-tap-highlight-color:transparent}
        .nav-item i{font-size:20px;transition:all 0.3s ease}
        .nav-item span{font-size:10px;font-weight:500}
        .nav-item.active{color:#4DA3FF}
        .nav-item.active i{transform:translateY(-2px)}
        .nav-item.active::after{content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:20px;height:3px;background:#4DA3FF;border-radius:3px}
        .nav-item.go-live .go-live-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#FF3B30,#FF4D8D);display:flex;align-items:center;justify-content:center;font-size:20px;color:#FFF;margin-top:-20px;box-shadow:0 6px 24px rgba(255,59,48,0.35);transition:all 0.3s ease}
        .nav-item.go-live span{color:#FF4D8D;margin-top:2px}

        .sk{background:linear-gradient(90deg,#1A2438 25%,#243050 50%,#1A2438 75%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:8px}
        @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

        .toast-container{position:fixed;top:20px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px}
        .toast{padding:12px 16px;border-radius:12px;font-size:13px;font-family:'Poppins',sans-serif;font-weight:500;display:flex;align-items:center;gap:8px;max-width:340px;animation:toastIn 0.4s ease,toastOut 0.4s ease 3.6s forwards;backdrop-filter:blur(10px)}
        .toast.success{background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.3);color:#34D399}
        .toast.error{background:rgba(255,59,48,0.15);border:1px solid rgba(255,59,48,0.3);color:#FF3B30}
        .toast.info{background:rgba(77,163,255,0.15);border:1px solid rgba(77,163,255,0.3);color:#4DA3FF}
        @keyframes toastIn{from{opacity:0;transform:translateX(80px)}to{opacity:1;transform:translateX(0)}}
        @keyframes toastOut{to{opacity:0;transform:translateX(80px)}}

        /* ===== RESPONSIVE ===== */
        @media(max-width:768px){
            .conv-panel{max-width:100%}
            .chat-panel{position:fixed;inset:0;z-index:150;background:#0B0F1A}
            .conv-item .conv-avatar{width:48px;height:48px;border-radius:14px}
            .msg-bubble-wrap{max-width:80%}
        }
        @media(min-width:769px){
            .chat-back-btn{display:none!important}
            .chat-panel{display:flex!important}
            .conv-panel.hidden-mobile{display:flex!important}
            .bottom-nav{display:none}
        }
        @media(max-width:360px){
            .conv-name{font-size:13px}
            .conv-last-msg{max-width:140px}
            .toast{max-width:calc(100vw - 32px)}
            .toast-container{right:10px;left:10px}
        }
        @supports(padding-bottom:env(safe-area-inset-bottom)){
            .msg-input-bar{padding-bottom:calc(10px + env(safe-area-inset-bottom))}
        }
    </style>
</head>
<body>

<div class="bg-glow"><div class="bg-orb"></div><div class="bg-orb"></div><div class="bg-orb"></div></div>
<div class="toast-container" id="toastContainer"></div>

<!-- New Message Modal -->
<div class="new-msg-overlay" id="newMsgOverlay" onclick="closeNewMsg(event)">
    <div class="new-msg-panel">
        <div class="panel-handle"></div>
        <div class="panel-title"><i class="fa-solid fa-pen-to-square"></i> New Message</div>
        <div class="new-msg-search-wrap">
            <i class="fa-solid fa-magnifying-glass new-msg-search-icon"></i>
            <input type="text" class="new-msg-search" id="newMsgSearch" placeholder="Search users..." oninput="searchNewMsgUsers(this.value)">
        </div>
        <div id="newMsgUserList"></div>
    </div>
</div>

<!-- App Shell -->
<div class="app-shell">

    <!-- CONVERSATIONS LIST -->
    <div class="conv-panel" id="convPanel">
        <div class="conv-header">
            <div class="conv-header-top">
                <div class="conv-title"><i class="fa-solid fa-comment-dots" style="margin-right:6px;"></i>Messages</div>
                <div class="conv-header-actions">
                    <button class="icon-btn" onclick="openNewMsg()" title="New message"><i class="fa-solid fa-pen-to-square"></i></button>

            <div class="conv-search-wrap">

                <input type="text" class="conv-search-input" id="convSearchInput" placeholder="Search conversations..." oninput="filterConversations(this.value)">

        <div class="conv-list" id="convList">
            <!-- Skeleton -->

                <div style="display:flex;gap:12px;padding:12px 16px;align-items:center">
                    <div class="sk" style="width:52px;height:52px;border-radius:16px;flex-shrink:0"></div>
                    <div style="flex:1"><div class="sk" style="height:14px;width:60%;margin-bottom:8px"></div><div class="sk" style="height:11px;width:80%"></div></div>
                </div>
                <div style="display:flex;gap:12px;padding:12px 16px;align-items:center">
                    <div class="sk" style="width:52px;height:52px;border-radius:16px;flex-shrink:0"></div>
                    <div style="flex:1"><div class="sk" style="height:14px;width:50%;margin-bottom:8px"></div><div class="sk" style="height:11px;width:70%"></div></div>
                </div>
                <div style="display:flex;gap:12px;padding:12px 16px;align-items:center">
                    <div class="sk" style="width:52px;height:52px;border-radius:16px;flex-shrink:0"></div>
                    <div style="flex:1"><div class="sk" style="height:14px;width:65%;margin-bottom:8px"></div><div class="sk" style="height:11px;width:55%"></div></div>
                </div>
            </div>

    <!-- CHAT PANEL -->
    <div class="chat-panel" id="chatPanel">

            <div class="no-chat-title">Select a Conversation</div>
            <div class="no-chat-text">Choose someone from the list to start chatting or tap <strong>New Message</strong> to begin.</div>
        </div>

        <div class="chat-header" id="chatHeader">
            <button class="chat-back-btn" id="chatBackBtn" onclick="closeChatMobile()"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="chat-header-avatar" id="chatAvatar" onclick="viewChatProfile()"><div class="cha-placeholder" id="chatAvatarContent">U</div></div>
            <div class="chat-header-info" onclick="viewChatProfile()">
                <div class="chat-header-name" id="chatName">User</div>
                <div class="chat-header-status" id="chatStatus"><i class="fa-solid fa-circle" style="font-size:6px;"></i> Offline</div>
            </div>
            <div class="chat-header-actions">
                <button class="icon-btn" onclick="viewChatProfile()" title="Profile"><i class="fa-solid fa-user"></i></button>
            </div>
        </div>

        <div class="messages-area" id="messagesArea"></div>

        <div class="typing-indicator" id="typingIndicator">
            <div class="msg-row-avatar"><div class="mra-placeholder" id="typingAvatar">U</div></div>
            <div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>

<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={apiKey: "AIzaSyATqi4oZTu5j5ZNJKN6dBRCN64c_zfzwVs",
  authDomain: "ooooo-a0f87.firebaseapp.com",
  projectId: "ooooo-a0f87",
  storageBucket: "ooooo-a0f87.firebasestorage.app",
  messagingSenderId: "427620508727",
  appId: "1:427620508727:web:360997dac7362780940bb2"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth(),db=firebase.firestore();

let currentUser=null,currentUserData=null,activeConvId=null,activeConvUser=null;
let convUnsubscribe=null,msgUnsubscribe=null,allConvs=[];
const EMOJIS=['😊','😂','🥰','😍','🤩','🎉','🔥','💯','👏','❤️','😭','🤣','😎','🙏','💪','🎵','🎧','✨','💫','⭐','😤','🤔','👀','🙌','💎','👑','🚀','💜','💙','💚','😘','🥺','💀','😈','🤝','✅'];

auth.onAuthStateChanged(async user=>{
    if(!user){window.location.href='index.html';return}
    currentUser=user;
    try{
        const uDoc=await db.collection('users').doc(user.uid).get();
        if(uDoc.exists){
            currentUserData=uDoc.data();
            if(currentUserData.role==='streamer')document.getElementById('goLiveNav').style.display='flex';
        }
        buildEmojiPicker();
        subscribeConversations();
        setupMsgInput();
        checkDirectOpen();
    }catch(err){console.error(err);showToast('Failed to load messages','error')}
});

function checkDirectOpen(){
    const p=new URLSearchParams(window.location.search);
    const uid=p.get('uid');
    if(uid)startConversation(uid);
}

// ===== SUBSCRIBE CONVERSATIONS =====
function subscribeConversations(){
    if(convUnsubscribe)convUnsubscribe();
    convUnsubscribe=db.collection('conversations')
        .where('participants','array-contains',currentUser.uid)
        .orderBy('lastMsgAt','desc')
        .limit(30)
        .onSnapshot(snap=>{
            document.getElementById('convSkeleton')?.remove();
            allConvs=snap.docs.map(d=>({id:d.id,...d.data()}));
            renderConversations(allConvs);
        },err=>{
            console.error('Conv sub error:',err);
            document.getElementById('convSkeleton')?.remove();
            renderConvEmpty();
        });
}

function renderConversations(convs){
    const list=document.getElementById('convList');
    list.innerHTML='';
    if(!convs.length){renderConvEmpty();return}

    convs.forEach((conv,i)=>{
        const otherId=conv.participants.find(p=>p!==currentUser.uid);
        const otherData=conv.participantData?.[otherId]||{};
        const isUnread=conv.unreadBy?.includes(currentUser.uid);
        const unreadCount=conv[`unread_${currentUser.uid}`]||0;

        const item=document.createElement('div');
        item.className=`conv-item${isUnread?' unread-conv':''}${activeConvId===conv.id?' active':''}`;
        item.style.animationDelay=`${i*0.04}s`;
        item.onclick=()=>openConversation(conv.id,otherId,otherData);

        const initial=(otherData.fullName||'U').charAt(0).toUpperCase();
        const grads=['linear-gradient(135deg,#4DA3FF,#A855F7)','linear-gradient(135deg,#FF4D8D,#FBBF24)','linear-gradient(135deg,#34D399,#4DA3FF)','linear-gradient(135deg,#A855F7,#FF4D8D)'];
        const grad=grads[initial.charCodeAt(0)%grads.length];
        const avatarHtml=otherData.avatar?`<img src="${otherData.avatar}" alt="">`:`<div class="ca-placeholder" style="background:${grad}">${initial}</div>`;

        const lastMsg=conv.lastMsg||'';
        const isMine=conv.lastSenderId===currentUser.uid;
        const timeStr=conv.lastMsgAt?getTimeAgo(conv.lastMsgAt):'';

        item.innerHTML=`
            <div class="conv-avatar-wrap">
                <div class="conv-avatar">${avatarHtml}</div>
                ${otherData.isOnline?'<div class="online-dot"></div>':''}
            </div>
            <div class="conv-info">
                <div class="conv-name-row">
                    <div class="conv-name">
                        ${escapeHtml(otherData.fullName||'User')}
                        ${otherData.isVerified?'<i class="fa-solid fa-circle-check verified"></i>':''}
                    </div>
                    <span class="conv-time">${timeStr}</span>
                </div>
                <div class="conv-last-row">
                    <span class="conv-last-msg ${isMine?'you':''}">${escapeHtml(lastMsg.substring(0,50))}</span>
                    ${unreadCount>0?`<span class="conv-unread-badge">${unreadCount>99?'99+':unreadCount}</span>`:''}
                </div>
            </div>`;
        list.appendChild(item);
    });
}

function renderConvEmpty(){
    const list=document.getElementById('convList');
    list.innerHTML=`
        <div class="conv-empty">
            <div class="conv-empty-icon"><i class="fa-solid fa-comment-dots"></i></div>
            <div class="conv-empty-title">No Messages Yet</div>
            <div class="conv-empty-text">Start a conversation by tapping the compose button above!</div>
        </div>`;
}

function filterConversations(query){
    const q=query.toLowerCase().trim();
    if(!q){renderConversations(allConvs);return}
    const filtered=allConvs.filter(c=>{
        const otherId=c.participants.find(p=>p!==currentUser.uid);
        const d=c.participantData?.[otherId]||{};
        return(d.fullName||'').toLowerCase().includes(q)||(d.username||'').toLowerCase().includes(q);
    });
    renderConversations(filtered);
}

// ===== OPEN CONVERSATION =====
async function openConversation(convId,otherId,otherData){
    activeConvId=convId;
    activeConvUser={uid:otherId,...otherData};

    // Update UI
    document.getElementById('noChatView').style.display='none';
    document.getElementById('chatHeader').classList.add('show');
    document.getElementById('msgInputBar').classList.add('show');
    document.getElementById('chatPanel').classList.add('show');

    // Mobile: hide conv panel
    if(window.innerWidth<769){
        document.getElementById('convPanel').classList.add('hidden-mobile');
        document.getElementById('chatBackBtn').style.display='flex';
        document.getElementById('bottomNav').classList.add('hidden');
    }

    // Set header
    const initial=(otherData.fullName||'U').charAt(0).toUpperCase();
    const avatarEl=document.getElementById('chatAvatar');
    if(otherData.avatar){
        avatarEl.innerHTML=`<img src="${otherData.avatar}" alt="">`;
    }else{
        document.getElementById('chatAvatarContent').textContent=initial;
    }
    document.getElementById('chatName').innerHTML=`${escapeHtml(otherData.fullName||'User')}${otherData.isVerified?'<i class="fa-solid fa-circle-check verified"></i>':''}`;
    document.getElementById('chatStatus').className=`chat-header-status${otherData.isOnline?' online':''}`;
    document.getElementById('chatStatus').innerHTML=`<i class="fa-solid fa-circle" style="font-size:6px;"></i> ${otherData.isOnline?'Online':'Offline'}`;

    // Mark active in list
    document.querySelectorAll('.conv-item').forEach(c=>c.classList.remove('active'));
    const items=document.querySelectorAll('.conv-item');
    const idx=allConvs.findIndex(c=>c.id===convId);
    if(items[idx])items[idx].classList.add('active');

    // Mark as read
    try{
        const updateObj={};
        updateObj[`unread_${currentUser.uid}`]=0;
        updateObj.unreadBy=firebase.firestore.FieldValue.arrayRemove(currentUser.uid);
        await db.collection('conversations').doc(convId).update(updateObj);
    }catch(err){console.error(err)}

    // Subscribe messages
    subscribeMessages(convId);
    document.getElementById('msgTextarea').focus();
}

// ===== SUBSCRIBE MESSAGES =====
function subscribeMessages(convId){
    if(msgUnsubscribe)msgUnsubscribe();
    const area=document.getElementById('messagesArea');
    area.innerHTML='';

    msgUnsubscribe=db.collection('conversations').doc(convId)
        .collection('messages')
        .orderBy('sentAt','asc')
        .limitToLast(60)
        .onSnapshot(snap=>{
            area.innerHTML='';
            let lastDate='',lastSender='';

            snap.forEach(doc=>{
                const msg=doc.data();
                const d=msg.sentAt?.toDate?msg.sentAt.toDate():new Date();
                const dateStr=d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

                if(dateStr!==lastDate){
                    lastDate=dateStr;
                    const divider=document.createElement('div');
                    divider.className='msg-date-divider';
                    divider.innerHTML=`<div class="msg-date-line"></div><span>${dateStr}</span><div class="msg-date-line"></div>`;
                    area.appendChild(divider);
                    lastSender='';
                }

                const isMine=msg.senderId===currentUser.uid;
                const consecutive=msg.senderId===lastSender;
                lastSender=msg.senderId;

                const row=document.createElement('div');
                row.className=`msg-row ${isMine?'sent':'received'}${consecutive?' consecutive':''}`;

                // Avatar (only show on first of group)
                let avatarHtml='';
                if(!consecutive&&!isMine){
                    const init=(activeConvUser?.fullName||'U').charAt(0).toUpperCase();
                    avatarHtml=activeConvUser?.avatar
                        ?`<div class="msg-row-avatar"><img src="${activeConvUser.avatar}" alt=""></div>`
                        :`<div class="msg-row-avatar"><div class="mra-placeholder">${init}</div></div>`;
                }else if(!consecutive&&isMine){
                    avatarHtml='';
                }

                const time=d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
                const statusClass=msg.read?'read':'delivered';

                let bubbleContent=escapeHtml(msg.text||'');
                const isEmojiOnly=/^[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{FE00}-\u{FEFF}]{1,3}$/u.test(msg.text||'');

                row.innerHTML=`
                    ${avatarHtml}
                    <div class="msg-bubble-wrap">
                        <div class="msg-bubble ${isEmojiOnly?'emoji-only':''}">${bubbleContent}</div>
                        ${!consecutive?`<div class="msg-time-label">
                            ${time}
                            ${isMine?`<i class="fa-solid fa-check-double msg-status-icon ${statusClass}"></i>`:''}
                        </div>`:''}
                    </div>`;

                area.appendChild(row);
            });

            scrollToBottom();
        },err=>{console.error('Messages sub error:',err)});
}

function scrollToBottom(){
    const area=document.getElementById('messagesArea');
    setTimeout(()=>{area.scrollTop=area.scrollHeight},50);
}

// ===== SEND MESSAGE =====
async function sendMessage(){
    const textarea=document.getElementById('msgTextarea');
    const text=textarea.value.trim();
    if(!text||!activeConvId)return;

    textarea.value='';
    textarea.style.height='38px';

    try{
        const batch=db.batch();
        const msgRef=db.collection('conversations').doc(activeConvId).collection('messages').doc();
        batch.set(msgRef,{
            senderId:currentUser.uid,
            text,
            sentAt:firebase.firestore.FieldValue.serverTimestamp(),
            read:false,
        });

        const otherId=activeConvUser?.uid;
        const convRef=db.collection('conversations').doc(activeConvId);
        const updateObj={
            lastMsg:text.substring(0,100),
            lastSenderId:currentUser.uid,
            lastMsgAt:firebase.firestore.FieldValue.serverTimestamp(),
        };
        if(otherId){
            updateObj[`unread_${otherId}`]=firebase.firestore.FieldValue.increment(1);
            updateObj.unreadBy=firebase.firestore.FieldValue.arrayUnion(otherId);
        }
        batch.update(convRef,updateObj);

        await batch.commit();
    }catch(err){
        console.error('Send error:',err);
        showToast('Failed to send message','error');
    }
}

// ===== START NEW CONVERSATION =====
async function startConversation(otherUid){
    // Check if conversation exists
    try{
        const snap=await db.collection('conversations')
            .where('participants','array-contains',currentUser.uid)
            .get();

        let existingConv=null;
        snap.forEach(doc=>{
            const data=doc.data();
            if(data.participants.includes(otherUid)){
                existingConv={id:doc.id,...data};
            }
        });

        if(existingConv){
            const otherId=existingConv.participants.find(p=>p!==currentUser.uid);
            const otherData=existingConv.participantData?.[otherId]||{};
            openConversation(existingConv.id,otherId,otherData);
            closeNewMsgForce();
            return;
        }

        // Create new conversation
        const otherDoc=await db.collection('users').doc(otherUid).get();
        if(!otherDoc.exists){showToast('User not found','error');return}
        const otherData=otherDoc.data();

        const convRef=await db.collection('conversations').add({
            participants:[currentUser.uid,otherUid],
            participantData:{
                [currentUser.uid]:{
                    fullName:currentUserData?.fullName||'User',
                    username:currentUserData?.username||'',
                    avatar:currentUserData?.avatar||'',
                    isVerified:currentUserData?.isVerified||false,
                    isOnline:true,
                },
                [otherUid]:{
                    fullName:otherData.fullName||'User',
                    username:otherData.username||'',
                    avatar:otherData.avatar||'',
                    isVerified:otherData.isVerified||false,
                    isOnline:false,
                },
            },
            lastMsg:'',
            lastSenderId:'',
            lastMsgAt:firebase.firestore.FieldValue.serverTimestamp(),
            [`unread_${currentUser.uid}`]:0,
            [`unread_${otherUid}`]:0,
            unreadBy:[],
            createdAt:firebase.firestore.FieldValue.serverTimestamp(),
        });

        openConversation(convRef.id,otherUid,{
            fullName:otherData.fullName,
            username:otherData.username,
            avatar:otherData.avatar,
            isVerified:otherData.isVerified,
        });
        closeNewMsgForce();
        showToast('Conversation created!','success');

    }catch(err){
        console.error('Start conv error:',err);
        showToast('Failed to start conversation','error');
    }
}

// ===== NEW MSG PANEL =====
function openNewMsg(){
    document.getElementById('newMsgOverlay').classList.add('open');
    document.getElementById('newMsgSearch').focus();
    loadFollowingUsers();
}

function closeNewMsg(e){
    if(e.target===document.getElementById('newMsgOverlay'))closeNewMsgForce();
}

function closeNewMsgForce(){
    document.getElementById('newMsgOverlay').classList.remove('open');
    document.getElementById('newMsgSearch').value='';
}

async function loadFollowingUsers(){
    const list=document.getElementById('newMsgUserList');
    list.innerHTML='<div style="text-align:center;padding:16px;color:#6B7280"><i class="fa-solid fa-rotate fa-spin" style="color:#4DA3FF"></i></div>';

    try{
        const snap=await db.collection('follows')
            .where('followerId','==',currentUser.uid)
            .limit(20)
            .get();

        list.innerHTML='';
        if(snap.empty){
            list.innerHTML='<div style="text-align:center;padding:24px;color:#6B7280;font-size:13px">Follow users to message them</div>';
            return;
        }

        for(const doc of snap.docs){
            const uid=doc.data().followingId;
            const uDoc=await db.collection('users').doc(uid).get();
            if(!uDoc.exists)continue;
            const u=uDoc.data();
            list.appendChild(buildNewMsgUserCard(uid,u));
        }
    }catch(err){
        console.error(err);
        list.innerHTML='<div style="text-align:center;padding:24px;color:#FF3B30">Failed to load</div>';
    }
}

async function searchNewMsgUsers(query){
    const q=query.toLowerCase().trim();
    const list=document.getElementById('newMsgUserList');
    if(!q){loadFollowingUsers();return}
    if(q.length<2)return;

    list.innerHTML='<div style="text-align:center;padding:16px;color:#6B7280"><i class="fa-solid fa-rotate fa-spin" style="color:#4DA3FF"></i></div>';

    try{
        const snap=await db.collection('users').orderBy('fullName').limit(50).get();
        list.innerHTML='';
        let count=0;
        snap.forEach(doc=>{
            if(doc.id===currentUser.uid)return;
            const u=doc.data();
            if((u.fullName||'').toLowerCase().includes(q)||(u.username||'').toLowerCase().includes(q)){
                list.appendChild(buildNewMsgUserCard(doc.id,u));
                count++;
            }
        });
        if(!count)list.innerHTML='<div style="text-align:center;padding:24px;color:#6B7280;font-size:13px">No users found</div>';
    }catch(err){
        console.error(err);
        list.innerHTML='<div style="text-align:center;padding:24px;color:#FF3B30">Search failed</div>';
    }
}

function buildNewMsgUserCard(uid,u){
    const card=document.createElement('div');
    card.className='panel-user-card';
    card.onclick=()=>startConversation(uid);

    const initial=(u.fullName||'U').charAt(0).toUpperCase();
    const grads=['linear-gradient(135deg,#4DA3FF,#A855F7)','linear-gradient(135deg,#FF4D8D,#FBBF24)','linear-gradient(135deg,#34D399,#4DA3FF)'];
    const grad=grads[initial.charCodeAt(0)%grads.length];
    const avatarHtml=u.avatar?`<img src="${u.avatar}" alt="">`:`<div class="puc-placeholder" style="background:${grad}">${initial}</div>`;

    card.innerHTML=`
        <div class="puc-avatar">${avatarHtml}</div>
        <div class="puc-info">
            <div class="puc-name">${escapeHtml(u.fullName||'User')}</div>
            <div class="puc-username">@${escapeHtml(u.username||'')}</div>
        </div>
        <span class="puc-role-tag ${u.role||'listener'}">${capitalize(u.role||'listener')}</span>`;
    return card;
}

// ===== MOBILE BACK =====
function closeChatMobile(){
    if(msgUnsubscribe)msgUnsubscribe();
    activeConvId=null;activeConvUser=null;
    document.getElementById('convPanel').classList.remove('hidden-mobile');
    document.getElementById('chatPanel').classList.remove('show');
    document.getElementById('chatHeader').classList.remove('show');
    document.getElementById('msgInputBar').classList.remove('show');
    document.getElementById('noChatView').style.display='flex';
    document.getElementById('bottomNav').classList.remove('hidden');
    document.getElementById('messagesArea').innerHTML='';
}

function viewChatProfile(){
    if(activeConvUser?.uid)window.location.href=`profile.html?uid=${activeConvUser.uid}`;
}

// ===== EMOJI PICKER =====
function buildEmojiPicker(){
    const picker=document.getElementById('emojiPicker');
    picker.innerHTML='';
    EMOJIS.forEach(e=>{
        const span=document.createElement('span');
        span.className='ep-emoji';
        span.textContent=e;
        span.onclick=()=>{
            const textarea=document.getElementById('msgTextarea');
            textarea.value+=e;
            textarea.focus();
        };
        picker.appendChild(span);
    });
}

function toggleEmojiPicker(){
    document.getElementById('emojiPicker').classList.toggle('open');
}

document.addEventListener('click',e=>{
    const picker=document.getElementById('emojiPicker');
    if(!picker.contains(e.target)&&!e.target.closest('.emoji-toggle-btn')){
        picker.classList.remove('open');
    }
});

// ===== INPUT =====
function setupMsgInput(){
    const textarea=document.getElementById('msgTextarea');
    textarea.addEventListener('keydown',e=>{
        if(e.key==='Enter'&&!e.shiftKey){
            e.preventDefault();
            sendMessage();
        }
    });
}

function autoGrowTextarea(el){
    el.style.height='38px';
    el.style.height=Math.min(el.scrollHeight,120)+'px';
}

// ===== UTILS =====
function getTimeAgo(ts){
    if(!ts)return '';
    const d=ts.toDate?ts.toDate():new Date();
    const diff=Date.now()-d.getTime();
    const mins=Math.floor(diff/60000);
    const hrs=Math.floor(diff/3600000);
    const days=Math.floor(diff/86400000);
    if(diff<60000)return 'Now';
    if(mins<60)return `${mins}m`;
    if(hrs<24)return `${hrs}h`;
    if(days<7)return `${days}d`;
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function capitalize(s){return s?s.charAt(0).toUpperCase()+s.slice(1):''}

function escapeHtml(str){const d=document.createElement('div');d.textContent=str||'';return d.innerHTML}

function showToast(message,type='info'){
    const container=document.getElementById('toastContainer');
    const icons={success:'fa-circle-check',error:'fa-circle-xmark',info:'fa-circle-info'};
    const toast=document.createElement('div');
    toast.className=`toast ${type}`;
    toast.innerHTML=`<i class="fa-solid ${icons[type]}"></i> ${message}`;
    container.appendChild(toast);
    setTimeout(()=>{if(toast.parentNode)toast.remove()},4000);
}

// Cleanup
window.addEventListener('beforeunload',()=>{
    if(convUnsubscribe)convUnsubscribe();
    if(msgUnsubscribe)msgUnsubscribe();
});
</script>
